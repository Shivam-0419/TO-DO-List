<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - TO-DO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            background: rgba(15, 38, 71, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 194, 212, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #ffffff, #00c2d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #7ecfdf;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            box-sizing: border-box;
        }

        .auth-submit {
            width: 100%;
            margin-top: 10px;
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 14px;
            color: #7ecfdf;
            opacity: 0.8;
        }

        .toggle-text a {
            color: #00c2d4;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TO-DO</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h2 id="auth-title">Sign In</h2>
                <form id="auth-form">
                    <div class="form-group" id="name-group" style="display: none;">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group" id="email-group" style="display: none;">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="add-button auth-submit" id="submit-btn">Sign In</button>
                </form>
                <p class="toggle-text" id="toggle-area">
                    Don't have an account? <a href="#" id="toggle-auth">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
